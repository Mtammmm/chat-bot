<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-content">
                <div class="header-title">
                    <h1>Gemini Chat</h1>
                    <p class="status-text">Ready to chat</p>
                </div>
                <div class="header-actions">
                    <button id="clearBtn" class="btn-icon" title="Clear chat">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6h16z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="chat-messages" id="messagesContainer">
            <div class="welcome-message">
                <div class="welcome-icon">🤖</div>
                <h2>Welcome to Gemini Chat!</h2>
                <p>Start a conversation with Google's Gemini AI. Ask anything and get intelligent responses.</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea 
                    id="userInput" 
                    class="chat-input" 
                    placeholder="Type your message here... (Shift+Enter for new line, Enter to send)"
                    rows="1"
                ></textarea>
                <button id="sendBtn" class="btn-send" title="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="input-info">
                <small>Powered by Google Gemini API</small>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
